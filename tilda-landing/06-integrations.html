<!-- Tilda block: Integrations strip -->
<style>
  .tg-logos-wrap {
    --tg-primary: #1c50de;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
    width: 100%;
    background: #fff;
    padding: 48px 24px;
    border-top: 1px solid #eef2ff;
    border-bottom: 1px solid #eef2ff;
  }
  .tg-logos-wrap *, .tg-logos-wrap *::before, .tg-logos-wrap *::after { box-sizing: border-box; }
  .tg-logos-inner {
    max-width: 1120px;
    margin: 0 auto;
    text-align: center;
  }
  .tg-logos-title {
    font-size: 13px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 0 0 24px;
  }
  .tg-logos-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 12px 16px;
  }
  .tg-logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 12px;
    background: #f8faff;
    border: 1px solid #e8edf5;
    font-size: 14px;
    font-weight: 600;
    color: #475569;
    transition: border-color .2s, box-shadow .2s;
  }
  .tg-logo-pill:hover {
    border-color: rgba(28,80,222,0.25);
    box-shadow: 0 4px 12px rgba(28,80,222,0.08);
  }
  .tg-logo-pill .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1c50de, #4d7aef);
  }
  .tg-logo-pill.builtin {
    border-style: dashed;
    border-color: rgba(28,80,222,0.3);
    color: var(--tg-primary);
  }
</style>

<div class="tg-logos-wrap">
  <div class="tg-logos-inner">
    <p class="tg-logos-title">Поддерживаемые источники и интеграции</p>
    <div class="tg-logos-row">
      <span class="tg-logo-pill"><span class="dot"></span>Контур.Закупки</span>
      <span class="tg-logo-pill"><span class="dot"></span>Seldon</span>
      <span class="tg-logo-pill"><span class="dot"></span>ТендерГуру</span>
      <span class="tg-logo-pill"><span class="dot"></span>Закупки360</span>
      <span class="tg-logo-pill"><span class="dot"></span>Saby Trade</span>
      <span class="tg-logo-pill builtin"><span class="dot"></span>ГосПлан API</span>
      <span class="tg-logo-pill"><span class="dot"></span>1С</span>
      <span class="tg-logo-pill"><span class="dot"></span>Битрикс24</span>
      <span class="tg-logo-pill"><span class="dot"></span>amoCRM</span>
      <span class="tg-logo-pill"><span class="dot"></span>Telegram</span>
    </div>
  </div>
</div>
