<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Превью лендинга — Тендерная платформа</title>
  <style>
    body { margin: 0; background: #e8edf5; font-family: system-ui, sans-serif; }
    .preview-bar {
      position: sticky; top: 0; z-index: 9999;
      background: #0f172a; color: #fff;
      padding: 10px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      font-size: 13px;
    }
    .preview-bar strong { color: #7aa2ff; }
    .preview-bar a { color: #94a3b8; margin-left: 12px; }
    .preview-section-label {
      background: #1c50de; color: #fff;
      padding: 8px 24px; font-size: 12px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    .preview-frame { background: #fff; }
  </style>
</head>
<body>
  <div class="preview-bar">
    <span><strong>Локальное превью</strong> — так будут выглядеть блоки в Tilda</span>
    <span>
      <a href="#hero">Hero</a>
      <a href="#integrations">Интеграции</a>
      <a href="#how">Схема</a>
      <a href="#platform">CRM·SRM·КП</a>
      <a href="#features">Фичи</a>
      <a href="#pricing">Тарифы</a>
      <a href="#cta">CTA</a>
    </span>
  </div>

  <div id="hero" class="preview-section-label">01 — Hero</div>
  <div class="preview-frame" id="inject-hero"></div>

  <div id="integrations" class="preview-section-label">06 — Интеграции</div>
  <div class="preview-frame" id="inject-integrations"></div>

  <div id="how" class="preview-section-label">02 — Как работает</div>
  <div class="preview-frame" id="inject-how"></div>

  <div id="platform" class="preview-section-label">07 — CRM · SRM · КП</div>
  <div class="preview-frame" id="inject-platform"></div>

  <div id="features" class="preview-section-label">03 — Возможности</div>
  <div class="preview-frame" id="inject-features"></div>

  <div id="pricing" class="preview-section-label">04 — Тарифы</div>
  <div class="preview-frame" id="inject-pricing"></div>

  <div id="cta" class="preview-section-label">05 — FAQ + CTA</div>
  <div class="preview-frame" id="inject-cta"></div>

  <script>
    const blocks = [
      ['inject-hero', '01-hero.html'],
      ['inject-integrations', '06-integrations.html'],
      ['inject-how', '02-how-it-works.html'],
      ['inject-platform', '07-crm-srm-kp.html'],
      ['inject-features', '03-features.html'],
      ['inject-compare', '08-crm-compare.html'],
      ['inject-pricing', '04-audience-pricing.html'],
      ['inject-cta', '05-faq-cta.html'],
    ];
    blocks.forEach(([id, file]) => {
      fetch(file)
        .then(r => r.text())
        .then(html => { document.getElementById(id).innerHTML = html; })
        .catch(() => {
          document.getElementById(id).innerHTML =
            '<p style="padding:24px;color:#991b1b">Не удалось загрузить ' + file +
            '. Откройте preview через локальный сервер (см. README).</p>';
        });
    });
  </script>
</body>
</html>
