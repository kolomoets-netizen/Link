<!-- Tilda Zero Block: вставьте ОДИН раз — лучше в КОНЦЕ страницы (после всех T123-блоков) -->
<link rel="stylesheet" href="https://static.tildacdn.com/css/fonts-tildasans.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<script src="https://cdn.jsdelivr.net/npm/lenis@1.3.23/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<style>
  html.lenis, html.lenis body { height: auto; }
  .lenis.lenis-smooth { scroll-behavior: auto !important; }
  .lenis:not(.lenis-autoToggle).lenis-stopped { overflow: clip; }
  .lenis [data-lenis-prevent],
  .lenis [data-lenis-prevent-wheel],
  .lenis [data-lenis-prevent-touch] { overscroll-behavior: contain; }
  .lenis.lenis-smooth iframe { pointer-events: none; }
</style>
<script>
(function () {
  if (window.__istocklinkEnhancements) return;
  window.__istocklinkEnhancements = true;

  function boot() {
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var LenisCtor = window.Lenis || globalThis.Lenis;

    if (!reduced && LenisCtor) {
      new LenisCtor({
        autoRaf: true,
        duration: 1.2,
        smoothWheel: true,
        touchMultiplier: 1.2,
        anchors: true,
      });
    }

    var selectors = [
      '.tg-hero-inner > div:first-child', '.tg-hero-visual', '.tg-positioning-inner',
      '.tg-how-header', '.tg-diagram', '.tg-step-card', '.tg-platform-header',
      '.tg-pillar', '.tg-funnel-board', '.tg-compare-header', '.tg-compare-matrix',
      '.tg-price-header', '.tg-price-card', '.tg-cta-box'
    ];

    if (!reduced) {
      selectors.forEach(function (sel) {
        document.querySelectorAll(sel).forEach(function (el, i) {
          el.setAttribute('data-aos', 'fade-up');
          el.setAttribute('data-aos-duration', '650');
          if (i % 4) el.setAttribute('data-aos-delay', String((i % 4) * 80));
        });
      });
    }

    if (window.AOS) AOS.init({ once: true, offset: 48, duration: 650, disable: reduced });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>
