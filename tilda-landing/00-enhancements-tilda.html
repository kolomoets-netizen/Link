<!-- Tilda zero-block: подключите один раз в начале страницы (не обязательно для превью на GitHub) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<style>
  body { font-family: 'Commissioner Variable', Commissioner, Arial, sans-serif; }
</style>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.3.17/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
(function () {
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduced && window.Lenis) {
    var lenis = new Lenis({ duration: 1.1, smoothWheel: true, touchMultiplier: 1.2 });
    (function raf(t) { lenis.raf(t); requestAnimationFrame(raf); })(0);
  }
  var selectors = [
    '.tg-hero-inner > div:first-child', '.tg-hero-visual', '.tg-logos-inner',
    '.tg-how-header', '.tg-diagram', '.tg-step-card', '.tg-platform-header',
    '.tg-pillar', '.tg-funnel-board', '.tg-feat-header', '.tg-feat-card',
    '.tg-compare-header', '.tg-compare-table', '.tg-compare-note',
    '.tg-price-header', '.tg-price-offer-plaque', '.tg-price-card',
    '.tg-faq-header', '.tg-faq-item', '.tg-cta-box'
  ];
  if (!reduced) {
    selectors.forEach(function (sel) {
      document.querySelectorAll(sel).forEach(function (el, i) {
        el.setAttribute('data-aos', 'fade-up');
        el.setAttribute('data-aos-duration', '650');
        if (i % 4) el.setAttribute('data-aos-delay', String((i % 4) * 80));
      });
    });
  }
  if (window.AOS) AOS.init({ once: true, offset: 48, duration: 650, disable: reduced });
})();
</script>
