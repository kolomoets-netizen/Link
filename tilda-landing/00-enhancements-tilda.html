<!-- Tilda zero-block: подключите один раз в начале страницы (не обязательно для превью на GitHub) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/plus-jakarta-sans@5.2.8/index.min.css">
<style>
  body { font-family: 'Plus Jakarta Sans Variable', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
</style>
<script src="https://cdn.jsdelivr.net/npm/lenis@1.3.17/dist/lenis.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
<script>
(function () {
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduced && window.Lenis) {
    var lenis = new Lenis({ duration: 1.1, smoothWheel: true });
    (function raf(t) { lenis.raf(t); requestAnimationFrame(raf); })(0);
  }
  document.querySelectorAll('.tg-feat-card,.tg-pillar,.tg-price-card,.tg-faq-item,.tg-step-card,.tg-cta-box').forEach(function (el, i) {
    el.setAttribute('data-aos', 'fade-up');
    if (i % 4) el.setAttribute('data-aos-delay', String((i % 4) * 80));
  });
  if (window.AOS) AOS.init({ once: true, offset: 48, disable: reduced });
})();
</script>
