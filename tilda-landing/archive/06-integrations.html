<!-- Tilda block: Aggregators strip -->
<style>
  .tg-logos-wrap {
    --tg-primary: #1c50de;
    font-family: 'TildaSans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    box-sizing: border-box;
    width: 100%;
    background: #fff;
    padding: 48px 24px;
    border-top: 1px solid #eef2ff;
    border-bottom: 1px solid #eef2ff;
  }
  .tg-logos-wrap *, .tg-logos-wrap *::before, .tg-logos-wrap *::after { box-sizing: border-box; }
  .tg-logos-inner {
    max-width: 1120px;
    margin: 0 auto;
    text-align: center;
  }
  .tg-logos-title {
    font-size: clamp(22px, 3vw, 28px);
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.02em;
    margin: 0 0 24px;
    text-transform: none;
  }
  .tg-logos-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 14px 18px;
  }
  .tg-logo-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 12px;
    background: #f8faff;
    border: 1px solid #e8edf5;
    font-size: 14px;
    font-weight: 600;
    color: #475569;
    transition: border-color .2s, box-shadow .2s;
  }
  .tg-logo-pill:hover {
    border-color: rgba(28,80,222,0.25);
    box-shadow: 0 4px 12px rgba(28,80,222,0.08);
  }
  .tg-logo-pill img {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    object-fit: contain;
    flex-shrink: 0;
  }
  @media (max-width: 560px) {
    .tg-logos-wrap { padding: 48px 20px; }
    .tg-logos-row { gap: 10px 12px; }
    .tg-logos-title { margin-bottom: 20px; font-size: 20px; }
  }
</style>

<div class="tg-logos-wrap">
  <div class="tg-logos-inner">
    <h2 class="tg-logos-title">Поддерживаемые агрегаторы закупок</h2>
    <div class="tg-logos-row">
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/kontur.png" alt="Контур.Закупки">
        Контур.Закупки
      </span>
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/seldon.png" alt="Seldon">
        Seldon
      </span>
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/tenderguru.png" alt="ТендерГуру">
        ТендерГуру
      </span>
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/zakupki360.png" alt="Закупки360">
        Закупки360
      </span>
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/saby.png" alt="Саби">
        Саби
      </span>
      <span class="tg-logo-pill">
        <img src="https://kolomoets-netizen.github.io/Link/assets/bicotender.png" alt="Бикотендер">

      </span>
    </div>
  </div>
</div>
