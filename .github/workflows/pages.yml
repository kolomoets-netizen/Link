name: Deploy landing preview

on:
  push:
    branches: [main, cursor/tilda-landing-blocks-4090]
    paths:
      - 'tilda-landing/**'
      - 'docs/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Build preview site
        run: |
          npm ci
          npm run build:preview
          mkdir -p _site/assets
          cp tilda-landing/preview-standalone.html _site/index.html
          cp tilda-landing/prototype-feed.html _site/prototype.html
          cp -r tilda-landing/assets/* _site/assets/
          cp -r tilda-landing/*.html _site/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
