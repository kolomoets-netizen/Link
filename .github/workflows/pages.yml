name: Deploy landing preview

on:
  push:
    branches: [main, cursor/tilda-landing-blocks-4090]
    paths:
      - 'tilda-landing/**'
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Build preview site
        run: |
          python3 << 'PY'
          from pathlib import Path
          blocks = [
              '01-hero.html', '06-integrations.html', '02-how-it-works.html',
              '07-crm-srm-kp.html', '03-features.html', '04-audience-pricing.html', '05-faq-cta.html',
          ]
          base = Path('tilda-landing')
          body = '\n\n'.join((base / n).read_text(encoding='utf-8').strip() for n in blocks)
          html = f'''<!DOCTYPE html>
          <html lang="ru">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>iStockLink</title>
          <style>body{{margin:0}}</style>
          </head>
          <body>
          {body}
          </body>
          </html>
          '''
          (base / 'preview-standalone.html').write_text(html, encoding='utf-8')
          Path('docs/index.html').write_text(html, encoding='utf-8')
          PY
          mkdir -p _site/assets
          cp tilda-landing/preview-standalone.html _site/index.html
          cp tilda-landing/prototype-feed.html _site/prototype.html
          cp -r tilda-landing/assets/* _site/assets/
          cp -r tilda-landing/*.html _site/ 2>/dev/null || true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
