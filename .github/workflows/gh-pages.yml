name: Deploy preview to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'tilda-landing/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p public/assets
          cp tilda-landing/preview-standalone.html public/index.html
          cp -r tilda-landing/assets/* public/assets/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true
