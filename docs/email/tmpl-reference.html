<!--
  Эталонный шаблон писем iStock.Link (сокращённая копия для разработки).
  Полная версия с base64-логотипом — в системе рассылки.
  Ключевые классы и стили: container, title-text, main-text, requisites, button, footer.
-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Шаблон iStock.Link</title>
</head>
<body style="color:#74787e;font-family:Arial,'Helvetica Neue',Helvetica,sans-serif;margin:0;padding:0;">
  <div class="container" style="background:#fff;margin:0 auto;max-width:600px;padding:25px 30px;">
    <div style="margin-bottom:24px;text-align:center;">
      <img src="{{layout_header_logo_url}}" alt="iStock.Link" width="560" style="display:block;margin:0 auto;border:none;">
    </div>
    <p class="title-text" style="color:#212229;font-size:16px;font-weight:700;text-align:center;text-transform:uppercase;">Заголовок</p>
    <p class="main-text" style="color:#212229;font-size:16px;line-height:21px;margin-top:24px;">Основной текст</p>
    <div class="requisites" style="background-color:#F3F6FF;margin-top:10px;padding:16px 20px;">Блок с акцентом</div>
    <div style="margin:24px 0;text-align:center;">
      <a href="#" class="button" style="background-color:#1c50de;border-radius:30px;color:#fff;display:inline-block;padding:10px 18px;text-decoration:none;">Кнопка</a>
    </div>
    <div class="footer" style="margin-top:24px;text-align:center;">
      <span style="color:#7f869e;font-size:12px;">Футер</span>
    </div>
  </div>
</body>
</html>
